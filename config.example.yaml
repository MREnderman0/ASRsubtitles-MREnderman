# ASR-MREnderman configuration

api:
  key: 'YOUR_API_KEY'
  base_url: 'YOUR_API_BASE_URL'
  model: 'mimo-v2.5-pro'
  llm_support_json: false

# Whether to use Demucs for vocal separation before transcription.
demucs: true

resource_limits:
  # auto/cuda/cpu. Set to cpu to avoid using the GPU for ASR by default.
  device: 'auto'
  # Fraction of CUDA memory PyTorch may reserve in this process. Use 0.5-0.8
  # to reduce pressure on the rest of the system; set null to disable.
  cuda_memory_fraction: 0.75
  # 0 means let PyTorch decide.
  torch_num_threads: 4
  whisperx:
    device: 'auto'
    # Keep this modest on desktop machines. Older builds used up to 16.
    batch_size: 4
    # auto/float16/int8/float32. int8 lowers VRAM use at some speed/quality cost.
    compute_type: 'int8'
    # true moves WhisperX alignment to CPU after transcription.
    align_on_cpu: false
  qwen3:
    device: 'auto'
  demucs:
    device: 'auto'
    jobs: 0
    # 0 means use the model default. Some htdemucs inputs fail with custom segment lengths.
    segment: 0
    overlap: 0.25

asr:
  backend: 'whisperx'
  qwen3:
    model_path: './_model_cache/Qwen3-ASR-1.7B'
    forced_aligner_path: './_model_cache/Qwen3-ForcedAligner-0.6B'
    language: 'Chinese'
    context: ''
    max_inference_batch_size: 1
    max_new_tokens: 512

subtitle_rag:
  max_chars: 17
  window_seconds: 600
  overlap_seconds: 30
  max_concurrent_llm_tasks: 3
  global_analysis_enabled: true

whisper:
  model: 'large-v3'
  language: 'zh'
  detected_language: 'en'
  runtime: 'local'
  whisperX_302_api_key: 'your_302_api_key'
  elevenlabs_api_key: 'your_elevenlabs_api_key'

model_dir: './_model_cache'

allowed_video_formats:
- 'mp4'
- 'mov'
- 'avi'
- 'mkv'
- 'flv'
- 'wmv'
- 'webm'

allowed_audio_formats:
- 'wav'
- 'mp3'
- 'flac'
- 'm4a'
